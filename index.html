<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; overflow:hidden; background:#fff; }

    #pillar-bg, #particles-bg {
      position:fixed; inset:0; width:100%; height:100%;
    }
    #pillar-bg    { z-index:0; }
    #particles-bg { z-index:1; }

    /* Hyperspeed fullscreen overlay — hidden by default */
    #hyperspeed-overlay {
      position:fixed; inset:0; z-index:8;
      opacity:0;
      transition: opacity 0.25s ease;
      pointer-events:none;      /* never blocks button clicks */
      background:#000;
    }
    #hyperspeed-overlay.active { opacity:1; }
    #hyperspeed-overlay canvas { position:absolute; inset:0; width:100%!important; height:100%!important; }

    #stage {
      position:fixed; inset:0; z-index:10;
      display:flex; align-items:center; justify-content:center;
    }

    button {
      position:relative; overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
      font-size:26px; font-weight:400; letter-spacing:-0.3px;
      color:#000; background:transparent;
      border:1.5px solid #000; border-radius:980px;
      padding:20px 64px; cursor:pointer;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease;
    }
    button:hover { transform:scale(1.06); box-shadow:0 0 28px 8px rgba(0,0,0,0.18); }
    button:active { transform:scale(1.02); }

    #gridscan-bg {
      position:absolute; inset:0; pointer-events:none;
      border-radius:inherit; overflow:hidden;
    }
    #gridscan-bg canvas { position:absolute; top:0; left:0; border-radius:inherit; }
    #btn-label { position:relative; z-index:2; pointer-events:none; }
  </style>
</head>
<body>
  <div id="pillar-bg"></div>
  <div id="particles-bg"></div>
  <div id="hyperspeed-overlay"></div>
  <div id="stage">
    <button id="the-button">
      <div id="gridscan-bg"></div>
      <span id="btn-label">The Button</span>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ogl@1.0.8/dist/ogl.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/postprocessing@6.36.3/build/index.umd.min.js"></script>

  <!-- ─── LIGHT PILLAR (with speed-multiplier for hyperspeed sync) ── -->
  <script>
  (function() {
    // Shared globals — hyperspeed script will write these
    window._pillarSpeedMult       = 1.0;
    window._pillarTargetSpeedMult = 1.0;

    const topColor='#f9f9f9', bottomColor='#000000',
          rotationSpeed=0.3, glowAmount=0.005,
          pillarWidth=3.0, pillarHeight=0.4, noiseIntensity=0.5;

    const container = document.getElementById('pillar-bg');
    let W=window.innerWidth, H=window.innerHeight;

    const renderer = new THREE.WebGLRenderer({antialias:false,alpha:true});
    renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    container.appendChild(renderer.domElement);

    const scene=new THREE.Scene(), camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
    const pc = hex => { const c=new THREE.Color(hex); return new THREE.Vector3(c.r,c.g,c.b); };

    const mat = new THREE.ShaderMaterial({
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}`,
      fragmentShader:`
        precision highp float;
        uniform float uTime;uniform vec2 uRes;
        uniform vec3 uTop,uBot;uniform float uInt,uGlow,uPW,uPH,uNoise;
        uniform float uRC,uRS,uPRC,uPRS,uWS,uWC;
        varying vec2 vUv;
        void main(){
          vec2 uv=(vUv*2.-1.)*vec2(uRes.x/uRes.y,1.);
          uv=vec2(uPRC*uv.x-uPRS*uv.y,uPRS*uv.x+uPRC*uv.y);
          vec3 ro=vec3(0,0,-10),rd=normalize(vec3(uv,1.));
          float rC=uRC,rS=uRS;
          vec3 col=vec3(0);float t=0.1;
          for(int i=0;i<80;i++){
            vec3 p=ro+rd*t;
            p.xz=vec2(rC*p.x-rS*p.z,rS*p.x+rC*p.z);
            vec3 q=p;q.y=p.y*uPH+uTime;
            float freq=1.,amp=1.;
            for(int j=0;j<4;j++){
              q.xz=vec2(uWC*q.x-uWS*q.z,uWS*q.x+uWC*q.z);
              q+=cos(q.zxy*freq-uTime*float(j)*2.)*amp;freq*=2.;amp*=.5;
            }
            float d=length(cos(q.xz))-.2,bound=length(p.xz)-uPW;
            float k=4.,h=max(k-abs(d-bound),0.);
            d=max(d,bound)+h*h*.0625/k;d=abs(d)*.15+.01;
            col+=mix(uBot,uTop,clamp((15.-p.y)/30.,0.,1.))/d;
            t+=d;if(t>50.)break;
          }
          col=tanh(col*uGlow/(uPW/3.));
          col-=fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453)/15.*uNoise;
          gl_FragColor=vec4(col*uInt,1.);
        }`,
      uniforms:{
        uTime:{value:0},uRes:{value:new THREE.Vector2(W,H)},
        uTop:{value:pc('#f9f9f9')},uBot:{value:pc('#000000')},
        uInt:{value:1},uGlow:{value:glowAmount},uPW:{value:pillarWidth},
        uPH:{value:pillarHeight},uNoise:{value:noiseIntensity},
        uRC:{value:1},uRS:{value:0},uPRC:{value:1},uPRS:{value:0},
        uWS:{value:Math.sin(.4)},uWC:{value:Math.cos(.4)},
      },
      transparent:true,depthWrite:false,depthTest:false,
    });
    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));
    window.addEventListener('resize',()=>{
      W=window.innerWidth;H=window.innerHeight;
      renderer.setSize(W,H);mat.uniforms.uRes.value.set(W,H);
    },{passive:true});

    let time=0;
    (function animate(){
      requestAnimationFrame(animate);
      // Smoothly interpolate speed multiplier toward target
      window._pillarSpeedMult+=(window._pillarTargetSpeedMult-window._pillarSpeedMult)*0.04;
      time+=0.016*rotationSpeed*window._pillarSpeedMult;
      mat.uniforms.uTime.value=time;
      mat.uniforms.uRC.value=Math.cos(time*.3);
      mat.uniforms.uRS.value=Math.sin(time*.3);
      renderer.render(scene,camera);
    })();
  })();
  </script>

  <!-- ─── PARTICLES ─────────────────────────────────────────────── -->
  <script>
  (function(){
    const{Renderer,Camera,Geometry,Program,Mesh}=OGL;
    const container=document.getElementById('particles-bg');
    const dpr=Math.min(devicePixelRatio,2);
    const renderer=new Renderer({dpr,depth:false,alpha:true});
    const gl=renderer.gl;
    container.appendChild(gl.canvas);
    gl.canvas.style.cssText='position:absolute;inset:0;';
    gl.clearColor(0,0,0,0);
    const cam=new Camera(gl,{fov:15});cam.position.set(0,0,20);
    const resize=()=>{renderer.setSize(container.clientWidth,container.clientHeight);cam.perspective({aspect:gl.canvas.width/gl.canvas.height});};
    window.addEventListener('resize',resize,{passive:true});resize();
    const h2r=hex=>{hex=hex.replace(/^#/,'');const i=parseInt(hex,16);return[((i>>16)&255)/255,((i>>8)&255)/255,(i&255)/255];};
    const N=200,pos=new Float32Array(N*3),rnd=new Float32Array(N*4),col=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      let x,y,z,l;do{x=Math.random()*2-1;y=Math.random()*2-1;z=Math.random()*2-1;l=x*x+y*y+z*z;}while(l>1||l===0);
      const r=Math.cbrt(Math.random());pos.set([x*r,y*r,z*r],i*3);
      rnd.set([Math.random(),Math.random(),Math.random(),Math.random()],i*4);
      col.set(h2r('#ffffff'),i*3);
    }
    const geo=new Geometry(gl,{position:{size:3,data:pos},random:{size:4,data:rnd},color:{size:3,data:col}});
    const prog=new Program(gl,{
      vertex:`attribute vec3 position;attribute vec4 random;attribute vec3 color;uniform mat4 modelMatrix,viewMatrix,projectionMatrix;uniform float uTime,uSpread,uBaseSize,uSizeRnd;varying vec4 vR;varying vec3 vC;void main(){vR=random;vC=color;vec3 p=position*uSpread;p.z*=10.;vec4 mP=modelMatrix*vec4(p,1.);mP.x+=sin(uTime*random.z+6.28*random.w)*mix(.1,1.5,random.x);mP.y+=sin(uTime*random.y+6.28*random.x)*mix(.1,1.5,random.w);mP.z+=sin(uTime*random.w+6.28*random.y)*mix(.1,1.5,random.z);vec4 mv=viewMatrix*mP;gl_PointSize=(uBaseSize*(1.+uSizeRnd*(random.x-.5)))/length(mv.xyz);gl_Position=projectionMatrix*mv;}`,
      fragment:`precision highp float;uniform float uTime;varying vec4 vR;varying vec3 vC;void main(){vec2 uv=gl_PointCoord.xy;float d=length(uv-vec2(.5));float c=smoothstep(.5,.4,d)*.8;gl_FragColor=vec4(vC+.2*sin(uv.yxx+uTime+vR.y*6.28),c);}`,
      uniforms:{uTime:{value:0},uSpread:{value:10},uBaseSize:{value:100*dpr},uSizeRnd:{value:1}},
      transparent:true,depthTest:false,
    });
    const mesh=new Mesh(gl,{mode:gl.POINTS,geometry:geo,program:prog});
    let last=performance.now(),el=0;
    (function tick(t){requestAnimationFrame(tick);el+=(t-last)*.1;last=t;prog.uniforms.uTime.value=el*.001;renderer.render({scene:mesh,camera:cam});})(performance.now());
  })();
  </script>

  <!-- ─── GRIDSCAN (inside button) ─────────────────────────────── -->
  <script>
  window.addEventListener('load', function() {
  (function(){
    const s=0.55,skewScale=0.06+(0.2-0.06)*s,tiltScale=0.12+(0.3-0.12)*s,
          yawScale=0.1+(0.28-0.1)*s,smoothTime=0.45+(0.12-0.45)*s,yBoost=1.2+(1.6-1.2)*s;
    const btn=document.getElementById('the-button');
    const container=document.getElementById('gridscan-bg');
    let W=btn.offsetWidth||300,H=btn.offsetHeight||72;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(W,H);
    renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.NoToneMapping;
    renderer.autoClear=false;renderer.setClearColor(0,0);
    container.appendChild(renderer.domElement);
    const scene=new THREE.Scene(),camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
    const{EffectComposer,EffectPass,RenderPass,BloomEffect,ChromaticAberrationEffect}=POSTPROCESSING;
    const srgb=hex=>new THREE.Color(hex).convertSRGBToLinear();
    const MAX_S=8;
    const U={
      iResolution:{value:new THREE.Vector3(W,H,renderer.getPixelRatio())},iTime:{value:0},
      uSkew:{value:new THREE.Vector2(0,0)},uTilt:{value:0},uYaw:{value:0},
      uLineThickness:{value:1},uLinesColor:{value:srgb('#2F293A')},uScanColor:{value:srgb('#0968e1')},
      uGridScale:{value:0.1},uLineStyle:{value:0},uLineJitter:{value:0.1},
      uScanOpacity:{value:0.4},uNoise:{value:0.01},uBloomOpacity:{value:0.6},
      uScanGlow:{value:0.5},uScanSoftness:{value:2},uPhaseTaper:{value:0.9},
      uScanDuration:{value:2},uScanDelay:{value:2},uScanDirection:{value:2},
      uScanStarts:{value:new Array(MAX_S).fill(0)},uScanCount:{value:0},
    };
    const mat=new THREE.ShaderMaterial({
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}`,
      fragmentShader:`
        precision highp float;
        uniform vec3 iResolution;uniform float iTime;uniform vec2 uSkew;uniform float uTilt,uYaw;
        uniform float uLineThickness;uniform vec3 uLinesColor,uScanColor;
        uniform float uGridScale,uLineStyle,uLineJitter,uScanOpacity,uNoise,uBloomOpacity;
        uniform float uScanGlow,uScanSoftness,uPhaseTaper,uScanDuration,uScanDelay,uScanDirection;
        uniform float uScanStarts[8];uniform float uScanCount;
        varying vec2 vUv;
        const int MAX_SCANS=8;
        float sm01(float a,float b,float x){float t=clamp((x-a)/max(1e-5,b-a),0.,1.);return t*t*t*(t*(t*6.-15.)+10.);}
        void mainImage(out vec4 fc,in vec2 fragCoord){
          vec2 p=(2.*fragCoord-iResolution.xy)/iResolution.y;
          vec3 ro=vec3(0),rd=normalize(vec3(p,2.));
          float cR=cos(uTilt),sR=sin(uTilt);rd.xy=mat2(cR,-sR,sR,cR)*rd.xy;
          float cY=cos(uYaw),sY=sin(uYaw);rd.xz=mat2(cY,-sY,sY,cY)*rd.xz;
          vec2 sk=clamp(uSkew,vec2(-.7),vec2(.7));rd.xy+=sk*rd.z;
          float minT=1e20,gs=max(1e-5,uGridScale);
          vec2 gUV=vec2(0);float hitY=1.;
          for(int i=0;i<4;i++){
            float isY=float(i<2);
            float pos=mix(-.2,.2,float(i))*isY+mix(-.5,.5,float(i-2))*(1.-isY);
            float num=pos-(isY*ro.y+(1.-isY)*ro.x);
            float den=isY*rd.y+(1.-isY)*rd.x;
            float t=num/den;vec3 h=ro+rd*t;
            h.xy+=sk*.15*smoothstep(0.,3.,h.z);
            bool use=t>0.&&t<minT;
            gUV=use?mix(h.zy,h.xz,isY)/gs:gUV;minT=use?t:minT;hitY=use?isY:hitY;
          }
          vec3 hit=ro+rd*minT;float dist=length(hit-ro);
          float ja=clamp(uLineJitter,0.,1.);
          if(ja>0.){gUV+=vec2(sin(gUV.y*2.7+iTime*1.8),cos(gUV.x*2.3-iTime*1.6))*.15*ja;}
          float fx=fract(gUV.x),fy=fract(gUV.y),ax=min(fx,1.-fx),ay=min(fy,1.-fy);
          float wx=fwidth(gUV.x),wy=fwidth(gUV.y),hp=max(0.,uLineThickness)*.5;
          float lX=1.-smoothstep(hp*wx,hp*wx+wx,ax),lY=1.-smoothstep(hp*wy,hp*wy+wy,ay);
          float pMask=max(lX,lY);
          vec2 gUV2=(hitY>.5?hit.xz:hit.zy)/gs;
          if(ja>0.){gUV2+=vec2(cos(gUV2.y*2.1-iTime*1.4),sin(gUV2.x*2.5+iTime*1.7))*.15*ja;}
          float fx2=fract(gUV2.x),fy2=fract(gUV2.y),ax2=min(fx2,1.-fx2),ay2=min(fy2,1.-fy2);
          float wx2=fwidth(gUV2.x),wy2=fwidth(gUV2.y);
          float lX2=1.-smoothstep(hp*wx2,hp*wx2+wx2,ax2),lY2=1.-smoothstep(hp*wy2,hp*wy2+wy2,ay2);
          float aMask=max(lX2,lY2);
          float eX=min(abs(hit.x+(-.5)),abs(hit.x-.5)),eY=min(abs(hit.y+(-.2)),abs(hit.y-.2));
          aMask*=1.-smoothstep(gs*.5,gs*2.,mix(eY,eX,hitY));
          float lineMask=max(pMask,aMask),fade=exp(-dist*2.);
          float dur=max(.05,uScanDuration),del=max(0.,uScanDelay);
          float sig=max(.001,.18*max(.1,uScanGlow)*uScanSoftness),sigA=sig*2.,hw=clamp(uPhaseTaper,0.,.49);
          float cp=0.,ca=0.;
          float cyc=dur+del,tCyc=mod(iTime,cyc),sPhase=clamp((tCyc-del)/dur,0.,1.),ph=sPhase;
          if(uScanDirection>1.5){float t2=mod(max(0.,iTime-del),2.*dur);ph=(t2<dur)?(t2/dur):(1.-(t2-dur)/dur);}
          float sz=ph*2.,dz=abs(hit.z-sz);
          float lb=exp(-.5*(dz*dz)/(sig*sig));
          float hf=sm01(0.,hw,ph),tf=1.-sm01(1.-hw,1.,ph),pw=hf*tf;
          cp+=lb*pw*clamp(uScanOpacity,0.,1.);ca+=(exp(-.5*(dz*dz)/(sigA*sigA))*.25)*pw*clamp(uScanOpacity,0.,1.);
          for(int i=0;i<MAX_SCANS;i++){
            if(float(i)>=uScanCount)break;
            float tA=iTime-uScanStarts[i],phI=clamp(tA/dur,0.,1.);
            if(uScanDirection>1.5)phI=(phI<.5)?(phI*2.):(1.-(phI-.5)*2.);
            float szI=phI*2.,dzI=abs(hit.z-szI);
            float hfI=sm01(0.,hw,phI),tfI=1.-sm01(1.-hw,1.,phI),pwI=hfI*tfI;
            cp+=exp(-.5*(dzI*dzI)/(sig*sig))*pwI*clamp(uScanOpacity,0.,1.);
            ca+=(exp(-.5*(dzI*dzI)/(sigA*sigA))*.25)*pwI*clamp(uScanOpacity,0.,1.);
          }
          vec3 col=uLinesColor*lineMask*fade+uScanColor*cp+uScanColor*ca;
          float n=fract(sin(dot(gl_FragCoord.xy+vec2(iTime*123.4),vec2(12.9898,78.233)))*43758.5453);
          col+=(n-.5)*uNoise;col=clamp(col,0.,1.);
          float alpha=clamp(max(lineMask,cp),0.,1.);
          float gx=1.-smoothstep(hp*wx*2.,hp*wx*2.+wx*2.,ax),gy=1.-smoothstep(hp*wy*2.,hp*wy*2.+wy*2.,ay);
          alpha=max(alpha,max(gx,gy)*fade*clamp(uBloomOpacity,0.,1.));
          fc=vec4(col,alpha);
        }
        void main(){vec4 c;mainImage(c,vUv*iResolution.xy);gl_FragColor=c;}`,
      uniforms:U,transparent:true,depthWrite:false,depthTest:false,
    });
    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));
    const composer=new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene,camera));
    const bloom=new BloomEffect({luminanceThreshold:0,luminanceSmoothing:0,intensity:0.6});
    const chroma=new ChromaticAberrationEffect({offset:new THREE.Vector2(0.002,0.002),radialModulation:true,modulationOffset:0});
    const ep=new EffectPass(camera,bloom,chroma);ep.renderToScreen=true;composer.addPass(ep);
    let lTX=0,lTY=0,lCX=0,lCY=0,tT=0,tC=0,yT=0,yC=0,leaveTimer=null;
    const vX={v:0},vY={v:0},vT={v:0},vYaw={v:0};
    function sd(cur,tgt,v,st,dt){
      st=Math.max(.0001,st);const om=2/st,x=om*dt,e=1/(1+x+.48*x*x+.235*x*x*x);
      let ch=cur-tgt,orig=tgt;tgt=cur-ch;const tmp=(v.v+om*ch)*dt;v.v=(v.v-om*tmp)*e;
      let out=tgt+(ch+tmp)*e;if((orig-cur)*(out-orig)>0){out=orig;v.v=0;}return out;
    }
    btn.addEventListener('mousemove',e=>{
      if(leaveTimer){clearTimeout(leaveTimer);leaveTimer=null;}
      const r=btn.getBoundingClientRect();
      lTX=((e.clientX-r.left)/r.width)*2-1;lTY=-(((e.clientY-r.top)/r.height)*2-1);
    },{passive:true});
    btn.addEventListener('mouseleave',()=>{
      if(leaveTimer)clearTimeout(leaveTimer);
      leaveTimer=setTimeout(()=>{lTX=0;lTY=0;tT=0;yT=0;leaveTimer=null;},250);
    });
    window.addEventListener('resize',()=>{
      W=btn.offsetWidth;H=btn.offsetHeight;
      renderer.setSize(W,H);composer.setSize(W,H);
      U.iResolution.value.set(W,H,renderer.getPixelRatio());
    },{passive:true});
    let last2=performance.now();
    (function tick2(){
      requestAnimationFrame(tick2);
      const now=performance.now(),dt=Math.min(.1,(now-last2)/1000);last2=now;
      lCX=sd(lCX,lTX,vX,smoothTime,dt);lCY=sd(lCY,lTY,vY,smoothTime,dt);
      tC=sd(tC,tT,vT,smoothTime,dt);yC=sd(yC,yT,vYaw,smoothTime,dt);
      U.uSkew.value.set(lCX*skewScale,-lCY*yBoost*skewScale);
      U.uTilt.value=tC*tiltScale;U.uYaw.value=Math.max(-.6,Math.min(.6,yC*yawScale));
      U.iTime.value=now/1000;renderer.clear(true,true,true);composer.render(dt);
    })();
  })();
  }); // end load
  </script>

  <!-- ─── HYPERSPEED (button-press effect) ─────────────────────── -->
  <script>
  window.addEventListener('load', function() {
  (function(){
    const{EffectComposer,EffectPass,RenderPass,BloomEffect}=POSTPROCESSING;

    // ── Utilities ───────────────────────────────────────────────
    const rnd=b=>Array.isArray(b)?Math.random()*(b[1]-b[0])+b[0]:Math.random()*b;
    const pick=a=>Array.isArray(a)?a[Math.floor(Math.random()*a.length)]:a;
    function lerp(cur,tgt,spd=0.1,lim=0.001){let c=(tgt-cur)*spd;if(Math.abs(c)<lim)c=tgt-cur;return c;}
    const nsin=v=>Math.sin(v)*.5+.5;

    // ── Turbulent distortion ────────────────────────────────────
    const tU={uFreq:{value:new THREE.Vector4(4,8,8,1)},uAmp:{value:new THREE.Vector4(25,5,10,10)}};
    const turbDist={
      uniforms:tU,
      getDistortion:`
        uniform vec4 uFreq,uAmp;
        float nsin(float v){return sin(v)*.5+.5;}
        #define PI 3.14159265358979
        float gdX(float p){return cos(PI*p*uFreq.r+uTime)*uAmp.r+pow(cos(PI*p*uFreq.g+uTime*(uFreq.g/uFreq.r)),2.)*uAmp.g;}
        float gdY(float p){return -nsin(PI*p*uFreq.b+uTime)*uAmp.b-pow(nsin(PI*p*uFreq.a+uTime/(uFreq.b/uFreq.a)),5.)*uAmp.a;}
        vec3 getDistortion(float progress){return vec3(gdX(progress)-gdX(0.0125),gdY(progress)-gdY(0.0125),0.);}`,
      getJS:(progress,time)=>{
        const f=tU.uFreq.value,a=tU.uAmp.value;
        const gX=p=>Math.cos(Math.PI*p*f.x+time)*a.x+Math.pow(Math.cos(Math.PI*p*f.y+time*(f.y/f.x)),2)*a.y;
        const gY=p=>-nsin(Math.PI*p*f.z+time)*a.z-Math.pow(nsin(Math.PI*p*f.w+time/(f.z/f.w)),5)*a.w;
        return new THREE.Vector3(gX(progress)-gX(progress+.007),gY(progress)-gY(progress+.007),0)
          .multiply(new THREE.Vector3(-2,-5,0)).add(new THREE.Vector3(0,0,-10));
      }
    };

    // ── Shaders ─────────────────────────────────────────────────
    const FOG_PARS_V = THREE.ShaderChunk['fog_pars_vertex'];
    const FOG_PARS_F = THREE.ShaderChunk['fog_pars_fragment'];
    const FOG_V      = THREE.ShaderChunk['fog_vertex'];
    const FOG_F      = THREE.ShaderChunk['fog_fragment'];

    const carLightsVert=`
      #define USE_FOG;${FOG_PARS_V}
      attribute vec3 aOffset,aMetrics,aColor;
      uniform float uTravelLength,uTime;
      varying vec2 vUv;varying vec3 vColor;
      #include <getDistortion_vertex>
      void main(){
        vec3 t=position.xyz;
        float radius=aMetrics.r,len=aMetrics.g,speed=aMetrics.b;
        t.xy*=radius;t.z*=len;
        t.z+=len-mod(uTime*speed+aOffset.z,uTravelLength);
        t.xy+=aOffset.xy;
        t.xyz+=getDistortion(abs(t.z/uTravelLength));
        vec4 mv=modelViewMatrix*vec4(t,1.);
        gl_Position=projectionMatrix*mv;vUv=uv;vColor=aColor;${FOG_V}}`;

    const carLightsFrag=`
      #define USE_FOG;${FOG_PARS_F}
      varying vec3 vColor;varying vec2 vUv;uniform vec2 uFade;
      void main(){
        float alpha=smoothstep(uFade.x,uFade.y,vUv.x);
        gl_FragColor=vec4(vColor,alpha);
        if(gl_FragColor.a<0.0001)discard;${FOG_F}}`;

    const sticksVert=`
      #define USE_FOG;${FOG_PARS_V}
      attribute float aOffset;attribute vec3 aColor;attribute vec2 aMetrics;
      uniform float uTravelLength,uTime;
      varying vec3 vColor;
      mat4 rotY(float a){return mat4(cos(a),0,sin(a),0,0,1,0,0,-sin(a),0,cos(a),0,0,0,0,1);}
      #include <getDistortion_vertex>
      void main(){
        vec3 t=position.xyz;
        t.xy*=vec2(aMetrics.x,aMetrics.y);
        float time=mod(uTime*120.+aOffset,uTravelLength);
        t=(rotY(3.14/2.)*vec4(t,1.)).xyz;
        t.z+=-uTravelLength+time;
        t.xyz+=getDistortion(abs(t.z/uTravelLength));
        t.y+=aMetrics.y/2.;t.x+=-aMetrics.x/2.;
        vec4 mv=modelViewMatrix*vec4(t,1.);gl_Position=projectionMatrix*mv;
        vColor=aColor;${FOG_V}}`;

    const sticksFrag=`
      #define USE_FOG;${FOG_PARS_F}
      varying vec3 vColor;
      void main(){gl_FragColor=vec4(vColor,1.);${FOG_F}}`;

    const roadVert=`
      #define USE_FOG;${FOG_PARS_V}
      uniform float uTime,uTravelLength;varying vec2 vUv;
      #include <getDistortion_vertex>
      void main(){
        vec3 t=position.xyz;
        vec3 d=getDistortion((t.y+uTravelLength/2.)/uTravelLength);
        t.x+=d.x;t.z+=d.y;t.y+=-d.z;
        vec4 mv=modelViewMatrix*vec4(t,1.);gl_Position=projectionMatrix*mv;vUv=uv;${FOG_V}}`;

    const roadFrag=`
      #define USE_FOG;${FOG_PARS_F}
      varying vec2 vUv;uniform vec3 uColor;uniform float uTime;
      uniform float uLanes,uBrokenLinesWidthPercentage,uBrokenLinesLengthPercentage;
      uniform vec3 uBrokenLinesColor,uShoulderLinesColor;
      void main(){
        vec2 uv=vUv;uv.y=mod(uv.y+uTime*.05,1.);
        vec3 color=vec3(uColor);
        float lw=1./uLanes,blw=lw*uBrokenLinesWidthPercentage;
        float bl=step(1.-blw,fract(uv.x*2.))*step(1.-uBrokenLinesLengthPercentage,fract(uv.y*10.));
        float sl=step(1.-blw,fract((uv.x-lw*(uLanes-1.))*2.))+step(blw,uv.x);
        bl=mix(bl,sl,uv.x);
        color=mix(color,vec3(uBrokenLinesColor),bl);
        gl_FragColor=vec4(color,1.);${FOG_F}}`;

    const islandFrag=`
      #define USE_FOG;${FOG_PARS_F}
      varying vec2 vUv;uniform vec3 uColor;uniform float uTime;
      void main(){gl_FragColor=vec4(uColor,1.);${FOG_F}}`;

    // ── Classes ─────────────────────────────────────────────────
    class CarLights{
      constructor(app,opts,colors,speed,fade){this.app=app;this.opts=opts;this.colors=colors;this.speed=speed;this.fade=fade;}
      init(){
        const o=this.opts;
        const curve=new THREE.LineCurve3(new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-1));
        const geo=new THREE.TubeGeometry(curve,40,1,8,false);
        const inst=new THREE.InstancedBufferGeometry().copy(geo);
        inst.instanceCount=o.lightPairsPerRoadWay*2;
        const lw=o.roadWidth/o.lanesPerRoad;
        const aOff=[],aMet=[],aCol=[];
        let cols=this.colors;
        cols=Array.isArray(cols)?cols.map(c=>new THREE.Color(c)):new THREE.Color(cols);
        for(let i=0;i<o.lightPairsPerRoadWay;i++){
          const radius=rnd(o.carLightsRadius),length=rnd(o.carLightsLength),speed=rnd(this.speed);
          let lx=((i%o.lanesPerRoad)*lw-o.roadWidth/2+lw/2)+rnd(o.carShiftX)*lw;
          const oy=rnd(o.carFloorSeparation)+radius*1.3,oz=-rnd(o.length),cw=rnd(o.carWidthPercentage)*lw;
          aOff.push(lx-cw/2,oy,oz,lx+cw/2,oy,oz);
          aMet.push(radius,length,speed,radius,length,speed);
          const c=pick(cols);aCol.push(c.r,c.g,c.b,c.r,c.g,c.b);
        }
        inst.setAttribute('aOffset',new THREE.InstancedBufferAttribute(new Float32Array(aOff),3,false));
        inst.setAttribute('aMetrics',new THREE.InstancedBufferAttribute(new Float32Array(aMet),3,false));
        inst.setAttribute('aColor',new THREE.InstancedBufferAttribute(new Float32Array(aCol),3,false));
        const mat=new THREE.ShaderMaterial({
          vertexShader:carLightsVert,fragmentShader:carLightsFrag,transparent:true,
          uniforms:Object.assign({uTime:{value:0},uTravelLength:{value:o.length},uFade:{value:this.fade}},this.app.fogU,o.distortion.uniforms)
        });
        mat.onBeforeCompile=s=>{s.vertexShader=s.vertexShader.replace('#include <getDistortion_vertex>',o.distortion.getDistortion);};
        this.mesh=new THREE.Mesh(inst,mat);this.mesh.frustumCulled=false;this.app.scene.add(this.mesh);
      }
      update(t){this.mesh.material.uniforms.uTime.value=t;}
    }

    class Sticks{
      constructor(app,opts){this.app=app;this.opts=opts;}
      init(){
        const o=this.opts;
        const geo=new THREE.PlaneGeometry(1,1);
        const inst=new THREE.InstancedBufferGeometry().copy(geo);
        inst.instanceCount=o.totalSideLightSticks;
        const step=o.length/(o.totalSideLightSticks-1);
        const aOff=[],aCol=[],aMet=[];
        let cols=o.colors.sticks;
        cols=Array.isArray(cols)?cols.map(c=>new THREE.Color(c)):new THREE.Color(cols);
        for(let i=0;i<o.totalSideLightSticks;i++){
          aOff.push((i-1)*step*2+step*Math.random());
          const c=pick(cols);aCol.push(c.r,c.g,c.b);
          aMet.push(rnd(o.lightStickWidth),rnd(o.lightStickHeight));
        }
        inst.setAttribute('aOffset',new THREE.InstancedBufferAttribute(new Float32Array(aOff),1,false));
        inst.setAttribute('aColor',new THREE.InstancedBufferAttribute(new Float32Array(aCol),3,false));
        inst.setAttribute('aMetrics',new THREE.InstancedBufferAttribute(new Float32Array(aMet),2,false));
        const mat=new THREE.ShaderMaterial({
          vertexShader:sticksVert,fragmentShader:sticksFrag,side:THREE.DoubleSide,
          uniforms:Object.assign({uTravelLength:{value:o.length},uTime:{value:0}},this.app.fogU,o.distortion.uniforms)
        });
        mat.onBeforeCompile=s=>{s.vertexShader=s.vertexShader.replace('#include <getDistortion_vertex>',o.distortion.getDistortion);};
        this.mesh=new THREE.Mesh(inst,mat);this.mesh.frustumCulled=false;this.app.scene.add(this.mesh);
      }
      update(t){this.mesh.material.uniforms.uTime.value=t;}
    }

    class Road{
      constructor(app,opts){this.app=app;this.opts=opts;this.uTime={value:0};}
      makePlane(side,isRoad){
        const o=this.opts;
        const geo=new THREE.PlaneGeometry(isRoad?o.roadWidth:o.islandWidth,o.length,20,100);
        const baseU={
          uTravelLength:{value:o.length},uTime:this.uTime,
          uColor:{value:new THREE.Color(isRoad?o.colors.roadColor:o.colors.islandColor)}
        };
        if(isRoad)Object.assign(baseU,{
          uLanes:{value:o.lanesPerRoad},uBrokenLinesColor:{value:new THREE.Color(o.colors.brokenLines)},
          uShoulderLinesColor:{value:new THREE.Color(o.colors.shoulderLines)},
          uShoulderLinesWidthPercentage:{value:o.shoulderLinesWidthPercentage},
          uBrokenLinesLengthPercentage:{value:o.brokenLinesLengthPercentage},
          uBrokenLinesWidthPercentage:{value:o.brokenLinesWidthPercentage},
        });
        const mat=new THREE.ShaderMaterial({
          vertexShader:roadVert,fragmentShader:isRoad?roadFrag:islandFrag,side:THREE.DoubleSide,
          uniforms:Object.assign(baseU,this.app.fogU,o.distortion.uniforms)
        });
        mat.onBeforeCompile=s=>{s.vertexShader=s.vertexShader.replace('#include <getDistortion_vertex>',o.distortion.getDistortion);};
        const mesh=new THREE.Mesh(geo,mat);
        mesh.rotation.x=-Math.PI/2;mesh.position.z=-o.length/2;
        mesh.position.x+=(o.islandWidth/2+o.roadWidth/2)*side;
        this.app.scene.add(mesh);return mesh;
      }
      init(){this.left=this.makePlane(-1,true);this.right=this.makePlane(1,true);this.island=this.makePlane(0,false);}
      update(t){this.uTime.value=t;}
    }

    class HyperspeedApp{
      constructor(container,opts){
        this.opts=opts;this.container=container;
        const W=Math.max(1,container.offsetWidth),H=Math.max(1,container.offsetHeight);
        this.renderer=new THREE.WebGLRenderer({antialias:false,alpha:false});
        this.renderer.setSize(W,H,false);this.renderer.setPixelRatio(devicePixelRatio);
        this.renderer.setClearColor(0x000000,1);
        container.appendChild(this.renderer.domElement);
        this.composer=new EffectComposer(this.renderer);
        this.camera=new THREE.PerspectiveCamera(opts.fov,W/H,.1,10000);
        this.camera.position.set(0,8,-5);
        this.scene=new THREE.Scene();
        this.scene.background=new THREE.Color(opts.colors.background);
        const fog=new THREE.Fog(opts.colors.background,opts.length*.2,opts.length*500);
        this.scene.fog=fog;
        this.fogU={fogColor:{value:fog.color},fogNear:{value:fog.near},fogFar:{value:fog.far}};
        this.clock=new THREE.Clock();
        this.speedUpTarget=0;this.speedUp=0;this.timeOffset=0;
        this.fovTarget=opts.fov;this.disposed=false;
        const rp=new RenderPass(this.scene,this.camera);
        const bp=new EffectPass(this.camera,new BloomEffect({luminanceThreshold:.2,luminanceSmoothing:0,intensity:1.5}));
        rp.renderToScreen=false;bp.renderToScreen=true;
        this.composer.addPass(rp);this.composer.addPass(bp);
        this.leftCars=new CarLights(this,opts,opts.colors.leftCars,opts.movingAwaySpeed,new THREE.Vector2(0,1-opts.carLightsFade));
        this.rightCars=new CarLights(this,opts,opts.colors.rightCars,opts.movingCloserSpeed,new THREE.Vector2(1,0+opts.carLightsFade));
        this.sticks=new Sticks(this,opts);
        this.road=new Road(this,opts);
        this.road.init();
        this.leftCars.init();this.leftCars.mesh.position.x=-opts.roadWidth/2-opts.islandWidth/2;
        this.rightCars.init();this.rightCars.mesh.position.x=opts.roadWidth/2+opts.islandWidth/2;
        this.sticks.init();this.sticks.mesh.position.x=-(opts.roadWidth+opts.islandWidth/2);
        window.addEventListener('resize',()=>this._resize(),{passive:true});
        this._tick();
      }
      _resize(){
        const W=this.container.offsetWidth,H=this.container.offsetHeight;
        if(W<=0||H<=0)return;
        this.renderer.setSize(W,H);this.camera.aspect=W/H;
        this.camera.updateProjectionMatrix();this.composer.setSize(W,H);
      }
      speedUpEffect(){this.fovTarget=this.opts.fovSpeedUp;this.speedUpTarget=this.opts.speedUp;}
      slowDownEffect(){this.fovTarget=this.opts.fov;this.speedUpTarget=0;}
      _tick(){
        if(this.disposed)return;
        const delta=this.clock.getDelta();
        const lp=Math.exp(-(-60*Math.log2(1-.1))*delta);
        this.speedUp+=lerp(this.speedUp,this.speedUpTarget,lp,.00001);
        this.timeOffset+=this.speedUp*delta;
        const t=this.clock.elapsedTime+this.timeOffset;
        this.leftCars.update(t);this.rightCars.update(t);this.sticks.update(t);this.road.update(t);
        let upd=false;
        const fc=lerp(this.camera.fov,this.fovTarget,lp);
        if(fc!==0){this.camera.fov+=fc*delta*6;upd=true;}
        if(this.opts.distortion.getJS){
          const d=this.opts.distortion.getJS(.025,t);
          this.camera.lookAt(this.camera.position.x+d.x,this.camera.position.y+d.y,this.camera.position.z+d.z);
          upd=true;
        }
        if(upd)this.camera.updateProjectionMatrix();
        this.composer.render(delta);
        requestAnimationFrame(()=>this._tick());
      }
    }

    // ── Init ────────────────────────────────────────────────────
    const opts={
      distortion:turbDist,length:400,roadWidth:10,islandWidth:2,lanesPerRoad:4,
      fov:90,fovSpeedUp:150,speedUp:2,carLightsFade:0.4,
      totalSideLightSticks:20,lightPairsPerRoadWay:40,
      shoulderLinesWidthPercentage:.05,brokenLinesWidthPercentage:.1,brokenLinesLengthPercentage:.5,
      lightStickWidth:[.12,.5],lightStickHeight:[1.3,1.7],
      movingAwaySpeed:[60,80],movingCloserSpeed:[-120,-160],
      carLightsLength:[400*.03,400*.2],carLightsRadius:[.05,.14],
      carWidthPercentage:[.3,.5],carShiftX:[-.8,.8],carFloorSeparation:[0,5],
      colors:{
        roadColor:0x080808,islandColor:0x0a0a0a,background:0x000000,
        shoulderLines:0xFFFFFF,brokenLines:0xFFFFFF,
        leftCars:[0xD856BF,0x6750A2,0xC247AC],rightCars:[0x03B3C3,0x0E5EA5,0x324555],sticks:0x03B3C3,
      }
    };

    const overlay=document.getElementById('hyperspeed-overlay');
    const app=new HyperspeedApp(overlay,opts);

    // ── Wire to button ──────────────────────────────────────────
    const btn=document.getElementById('the-button');
    const engage=()=>{
      overlay.classList.add('active');
      app.speedUpEffect();
      window._pillarTargetSpeedMult=0.06;  // pillar nearly freezes
    };
    const disengage=()=>{
      overlay.classList.remove('active');
      app.slowDownEffect();
      window._pillarTargetSpeedMult=1.0;   // pillar returns to normal speed
    };
    btn.addEventListener('mousedown', engage);
    btn.addEventListener('mouseup',   disengage);
    btn.addEventListener('mouseleave',disengage);
    btn.addEventListener('touchstart',engage,   {passive:true});
    btn.addEventListener('touchend',  disengage,{passive:true});
    btn.addEventListener('touchcancel',disengage,{passive:true});
  })();
  }); // end load
  </script>
</body>
</html>
